<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Photoclass 2026 — Focal Point</title>
<meta name="description" content="Focal Point Photoclass 2026 is a free, cohort-based photography course. Ten units, real assignments, mentor feedback, and a community of photographers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--mag:#9F217E;--teal:#5BAAB5;--yellow:#EACC28;--dark:#0e0618;--off:#FFFCF6;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--dark);}
body{font-family:'Poppins',sans-serif;background:linear-gradient(155deg,#3a7a85 0%,#5BAAB5 20%,#7c3a82 50%,#9F217E 75%,#7a1860 100%) fixed;color:var(--off);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:68px;background:rgba(0,0,0,.35);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:0 48px;}
.nav-logo img{height:32px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{font-size:12.5px;font-weight:600;color:rgba(255,252,246,.6);padding:7px 14px;border-radius:8px;transition:all .15s;}
.nav-link:hover,.nav-link.active{color:var(--off);background:rgba(255,255,255,.08);}
.nav-cta{background:var(--mag);color:#fff;border-radius:99px;padding:9px 20px;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:filter .15s;}
.nav-cta:hover{filter:brightness(1.1);}
.nav-mob{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--off);}
@media(max-width:820px){.nav{padding:0 20px;}.nav-links{display:none;}.nav-mob{display:flex;align-items:center;}}

/* MOBILE DRAWER */
.mob-drawer{display:none;position:fixed;inset:0;z-index:300;}
.mob-drawer.open{display:block;}
.mob-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);}
.mob-panel{position:absolute;top:0;right:0;bottom:0;width:260px;background:#1a0d2e;padding:24px 20px;display:flex;flex-direction:column;gap:4px;}
.mob-close{background:none;border:none;color:var(--off);font-size:22px;cursor:pointer;align-self:flex-end;margin-bottom:12px;}
.mob-link{font-size:14px;font-weight:600;color:rgba(255,252,246,.7);padding:10px 12px;border-radius:8px;transition:all .15s;}
.mob-link:hover{color:var(--off);background:rgba(255,255,255,.08);}
.mob-cta{margin-top:16px;background:var(--mag);color:#fff;border-radius:99px;padding:11px 20px;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;}

/* HERO */
.hero{padding:72px 48px 48px;max-width:760px;margin:0 auto;}
.hero-ey{font-size:28px;font-weight:800;color:var(--yellow);margin-bottom:10px;line-height:1.15;}
.hero-title{font-family:'Poppins',sans-serif;font-size:48px;font-weight:800;line-height:1.05;letter-spacing:-.03em;color:var(--off);margin-bottom:18px;}
.hero-sub{font-size:16px;line-height:1.7;color:rgba(255,252,246,.7);margin-bottom:6px;max-width:600px;}
.hero-sub-bold{font-size:16px;line-height:1.7;color:rgba(255,252,246,.85);font-weight:700;margin-bottom:28px;max-width:600px;}
.hero-acts{display:flex;gap:12px;flex-wrap:wrap;}
.btn-y{background:var(--yellow);color:#1a1018;border-radius:99px;padding:13px 26px;font-size:13px;font-weight:700;letter-spacing:.05em;transition:filter .15s;}
.btn-y:hover{filter:brightness(1.08);}
.btn-o{background:rgba(255,255,255,.1);color:var(--off);border-radius:99px;padding:13px 26px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.15);transition:all .15s;}
.btn-o:hover{background:rgba(255,255,255,.15);}

/* STRIP */
.strip{background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);padding:24px 48px;}
.strip-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:28px;}
.feat{display:flex;align-items:flex-start;gap:12px;}
.feat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.feat-label{font-size:13px;font-weight:700;color:var(--off);margin-bottom:2px;}
.feat-desc{font-size:11px;color:rgba(255,252,246,.45);line-height:1.45;}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:48px 48px 80px;}

/* COHORT BANNER */
.cohort-banner{display:flex;align-items:flex-start;gap:12px;background:rgba(91,170,181,.1);border:1px solid rgba(91,170,181,.25);border-radius:10px;padding:14px 16px;margin-bottom:40px;}
.cohort-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px;}
.cohort-text{font-size:13px;line
