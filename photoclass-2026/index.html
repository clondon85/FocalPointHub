<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Photoclass 2026 — Focal Point</title>
<meta name="description" content="Focal Point Photoclass 2026 is a free, cohort-based photography course. Ten units, real assignments, mentor feedback, and a community of photographers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--mag:#9F217E;--teal:#5BAAB5;--yellow:#EACC28;--grad:linear-gradient(155deg,#3a7a85 0%,#7c3a82 50%,#9F217E 100%);--dark:#0e0618;--off:#FFFCF6;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--dark);}
body{font-family:'Poppins',sans-serif;background:linear-gradient(155deg,#3a7a85 0%,#5BAAB5 20%,#7c3a82 50%,#9F217E 75%,#7a1860 100%) fixed;color:var(--off);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;}
.nav{position:sticky;top:0;z-index:200;height:68px;background:rgba(40,15,55,.45);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:0 48px;}
.nav-logo img{height:32px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{font-family:'Poppins',sans-serif;font-size:12.5px;font-weight:600;color:rgba(255,252,246,.6);padding:7px 14px;border-radius:8px;transition:all .15s;text-decoration:none;white-space:nowrap;}
.nav-link:hover,.nav-link.active{color:var(--off);background:rgba(255,255,255,.08);}
.nav-cta{background:var(--mag);color:#fff;border-radius:99px;padding:9px 20px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:filter .15s;text-decoration:none;white-space:nowrap;}
.nav-cta:hover{filter:brightness(1.1);}
.nav-mob{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--off);}
@media(max-width:820px){.nav{padding:0 20px;}.nav-links{display:none;}.nav-mob{display:flex;align-items:center;}}
.mob-drawer{display:none;position:fixed;inset:0;z-index:300;}
.mob-drawer.open{display:block;}
.mob-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.mob-panel{position:absolute;top:0;right:0;bottom:0;width:280px;background:#1a0a24;border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;padding:24px;transform:translateX(100%);transition:transform .25s ease;}
.mob-drawer.open .mob-panel{transform:translateX(0);}
.mob-close{align-self:flex-end;background:none;border:none;color:rgba(255,252,246,.6);cursor:pointer;font-size:24px;line-height:1;margin-bottom:24px;}
.mob-link{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;color:rgba(255,252,246,.75);padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);text-decoration:none;transition:color .15s;}
.mob-link:hover{color:var(--off);}
.mob-cta{margin-top:24px;background:var(--mag);color:#fff;border-radius:99px;padding:13px 24px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;text-decoration:none;}
.footer{background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.07);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.footer-logo img{height:22px;width:auto;opacity:.7;}
.footer-copy{font-size:11px;color:rgba(255,252,246,.25);}
.footer-links{display:flex;gap:20px;}
.footer-link{font-size:11px;color:rgba(255,252,246,.3);transition:color .15s;text-decoration:none;}
.footer-link:hover{color:rgba(255,252,246,.7);}
@media(max-width:820px){.footer{padding:24px;}}

.hero{background:transparent;padding:80px 48px 72px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(234,204,40,.1) 0%,transparent 70%);pointer-events:none;}
.hero-inner{max-width:940px;margin:0 auto;}
.hero-ey{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--yellow);margin-bottom:14px;}
.hero-title{font-size:52px;font-weight:800;line-height:1.07;letter-spacing:-.03em;color:var(--off);margin-bottom:16px;}
.hero-sub{font-size:16px;color:rgba(255,252,246,.72);line-height:1.72;max-width:600px;margin-bottom:28px;}
.hero-acts{display:flex;gap:12px;flex-wrap:wrap;}
.btn-y{background:var(--yellow);color:#1a1018;border-radius:99px;padding:13px 28px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;display:inline-block;}
.btn-y:hover{filter:brightness(1.08);}
.btn-o{background:transparent;color:var(--off);border:1.5px solid rgba(255,255,255,.35);border-radius:99px;padding:12px 24px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;transition:all .15s;display:inline-block;}
.btn-o:hover{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);}
.strip{background:rgba(0,0,0,.15);border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);padding:28px 48px;}
.strip-inner{max-width:940px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.feat{text-align:center;}
.feat-icon{width:34px;height:34px;border-radius:10px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
.feat-label{font-size:12px;font-weight:700;color:var(--off);margin-bottom:3px;}
.feat-desc{font-size:11px;color:rgba(255,252,246,.45);line-height:1.5;}
.content{max-width:940px;margin:0 auto;padding:56px 48px 80px;}
.cohort-banner{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:14px;margin-bottom:40px;}
.cohort-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.cohort-text{font-size:14px;color:rgba(255,252,246,.8);line-height:1.6;}
.cohort-text strong{color:var(--off);}
.section-ey{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--yellow);margin-bottom:10px;}
.section-title{font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--off);margin-bottom:32px;}
.units{display:flex;flex-direction:column;gap:8px;}

@media(max-width:820px){.hero{padding:56px 24px 48px;}.hero-title{font-size:36px;}.strip-inner{grid-template-columns:1fr 1fr;gap:16px;}.strip{padding:24px;}.content{padding:40px 24px 64px;}}
@media(max-width:560px){.strip-inner{grid-template-columns:1fr;}}

/* ── SQUARE UNIT CARDS ── */
.units{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.unit-card{
  position:relative;border-radius:14px;overflow:hidden;
  display:block;aspect-ratio:1;
  border:1px solid rgba(255,255,255,.1);
  transition:border-color .15s,transform .15s;
}
a.unit-card:hover{border-color:rgba(255,255,255,.28);transform:translateY(-3px);}
.unit-card.locked{opacity:.65;cursor:default;filter:grayscale(20%);}
.uc-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:rgba(255,255,255,.04);}
.uc-arrow{position:absolute;bottom:12px;right:12px;color:rgba(255,252,246,.5);transition:color .15s;}
a.unit-card:hover .uc-arrow{color:var(--teal);}
.uc-label{
  position:absolute;top:50%;left:12px;right:12px;transform:translateY(-50%);
  background:rgba(8,3,18,.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;
}
.unit-num{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mag);margin-bottom:4px;}
.unit-title{font-size:14px;font-weight:800;color:var(--off);line-height:1.2;margin-bottom:3px;text-wrap:balance;}
.unit-sub{font-size:11px;color:rgba(255,252,246,.55);line-height:1.35;text-wrap:pretty;}
.unit-badge{font-size:10px;font-weight:700;color:rgba(255,252,246,.4);display:block;margin-top:4px;}
@media(max-width:820px){.units{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.units{grid-template-columns:1fr;aspect-ratio:auto;}.unit-card{aspect-ratio:1;}}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="https://thefocalpointhub.com">
    <img src="/img/logo-white.webp" alt="Focal Point">
  </a>
  <div class="nav-links">
    <a class="nav-link active" href="/photoclass-2026/">Photoclass 2026</a>
    <a class="nav-link" href="https://courses.thefocalpointhub.com">Courses</a>
    <a class="nav-link" href="/52-weeks/">52 Weeks</a>
    <a class="nav-link" href="https://discord.gg/fzKjSY8JTR" target="_blank" rel="noopener">Community</a>
    <a class="nav-link" href="https://thefocalpointhub.com/blog">Blog</a>
  </div>
  <a class="nav-cta" href="https://learn.thefocalpointhub.com">My Focal Point →</a>
  <button class="nav-mob" aria-label="Menu" onclick="openMobMenu()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 6h16M3 11h16M3 16h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
</nav>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-overlay" onclick="closeMobMenu()"></div>
  <div class="mob-panel">
    <button class="mob-close" onclick="closeMobMenu()">&#xd7;</button>
    <a class="mob-link" href="/photoclass-2026/" onclick="closeMobMenu()">Photoclass 2026</a>
    <a class="mob-link" href="https://courses.thefocalpointhub.com" onclick="closeMobMenu()">Courses</a>
    <a class="mob-link" href="/52-weeks/" onclick="closeMobMenu()">52 Weeks</a>
    <a class="mob-link" href="https://discord.gg/fzKjSY8JTR" target="_blank" rel="noopener" onclick="closeMobMenu()">Community</a>
    <a class="mob-link" href="https://thefocalpointhub.com/blog" onclick="closeMobMenu()">Blog</a>
    <a class="mob-cta" href="https://learn.thefocalpointhub.com">My Focal Point →</a>
  </div>
</div>

<!-- All remaining HTML (hero, strip, content, units, footer) is identical to the original —
     only the CSS above changed. Paste your existing body content here unchanged. -->

<script>
function openMobMenu(){document.getElementById('mob-drawer').classList.add('open');document.body.style.overflow='hidden';}
function closeMobMenu(){document.getElementById('mob-drawer').classList.remove('open');document.body.style.overflow='';}
</script>
</body>
</html>
