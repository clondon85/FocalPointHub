<style>
:root{--mag:#9F217E;--teal:#5BAAB5;--yellow:#EACC28;--dark:#0e0618;--off:#FFFCF6;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html,body{height:100%;overflow:hidden;background:var(--dark);}
body{color:var(--off);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;}
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;background:rgba(14,6,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:0 48px;}
.nav-logo img{height:32px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{font-size:12.5px;font-weight:600;color:rgba(255,252,246,.6);padding:7px 14px;border-radius:8px;transition:all .15s;}
.nav-link:hover,.nav-link.active{color:var(--off);background:rgba(255,255,255,.08);}
.nav-cta{background:var(--mag);color:#fff;border-radius:99px;padding:9px 20px;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:filter .15s;}
.nav-cta:hover{filter:brightness(1.1);}
.nav-mob{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--off);}
.unit-bar{position:fixed;top:68px;left:0;right:0;z-index:190;height:52px;background:transparent;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 48px;}
.unit-bar-left{display:flex;align-items:center;gap:12px;}
.unit-bar-back{font-size:12px;font-weight:700;color:rgba(255,252,246,.55);display:flex;align-items:center;gap:6px;transition:color .15s;}
.unit-bar-back:hover{color:var(--off);}
.unit-bar-divider{width:1px;height:18px;background:rgba(255,255,255,.15);}
.unit-bar-label{display:flex;flex-direction:column;}
.unit-bar-num{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mag);}
.unit-bar-title{font-size:13px;font-weight:700;color:var(--off);}
.unit-nav{display:flex;align-items:center;gap:8px;}
.unit-nav-btn{font-size:12px;font-weight:700;color:rgba(255,252,246,.7);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 14px;transition:all .15s;white-space:nowrap;}
a.unit-nav-btn:hover{background:rgba(255,255,255,.15);color:var(--off);}
.unit-nav-btn.disabled{opacity:.35;cursor:default;pointer-events:none;}
.iframe-wrap{position:fixed;top:68px;left:0;right:0;bottom:0;overflow:hidden;}
.unit-iframe{width:100%;height:100%;border:none;display:block;}
.mob-drawer{display:none;position:fixed;inset:0;z-index:300;}
.mob-drawer.open{display:block;}
.mob-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.mob-panel{position:absolute;top:0;right:0;bottom:0;width:280px;background:#1a0a24;border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;padding:24px;transform:translateX(100%);transition:transform .25s ease;}
.mob-drawer.open .mob-panel{transform:translateX(0);}
.mob-close{align-self:flex-end;background:none;border:none;color:rgba(255,252,246,.6);cursor:pointer;font-size:24px;line-height:1;margin-bottom:24px;}
.mob-link{font-size:16px;font-weight:600;color:rgba(255,252,246,.7);padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.mob-link:hover{color:var(--off);}
.mob-cta{margin-top:24px;background:var(--mag);color:#fff;border-radius:99px;padding:13px 24px;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;}
@media(max-width:820px){
  .nav{padding:0 20px;}
  .nav-links,.nav-cta{display:none;}
  .nav-mob{display:flex;align-items:center;}
  .unit-bar{padding:0 16px;}
  .unit-bar-title{display:none;}
  .unit-nav-btn{padding:5px 10px;font-size:11px;}
}
</style>
</head>

  </button>
</nav>
