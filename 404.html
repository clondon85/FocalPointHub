<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redirecting — Focal Point</title>
<script>
var path = window.location.pathname;
var redirectMap = [
  { prefix: '/blog-52', base: 'https://heptagon-clover-9zj2.squarespace.com' },
];
var match = redirectMap.find(function(r){ return path.startsWith(r.prefix); });
if (match) {
  window.location.replace(match.base + path + window.location.search);
} else {
  document.title = 'Page not found — Focal Point';
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--mag:#9F217E;--teal:#5BAAB5;--yellow:#EACC28;--dark:#0e0618;--off:#FFFCF6;}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--dark);}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(155deg,#3a7a85 0%,#5BAAB5 20%,#7c3a82 50%,#9F217E 75%,#7a1860 100%) fixed;
  color:var(--off);min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
  -webkit-font-smoothing:antialiased;
}
.four04{
  font-family:'Poppins',sans-serif;
  font-size:120px;font-weight:800;
  line-height:1;letter-spacing:-.05em;
  color:rgba(255,252,246,.08);
  margin-bottom:8px;
  user-select:none;
}
h1{
  font-family:'Poppins',sans-serif;
  font-size:28px;font-weight:800;
  letter-spacing:-.02em;
  color:var(--off);margin-bottom:12px;
}
p{font-size:15px;color:rgba(255,252,246,.58);line-height:1.7;max-width:400px;margin-bottom:32px;}
.btn{
  background:var(--yellow);color:#1a1018;
  border-radius:99px;padding:13px 28px;
  font-family:'Poppins',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  text-decoration:none;transition:all .15s;display:inline-block;
}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
</style>
</head>
<body id="not-found" style="display:none;">
  <div class="four04">404</div>
  <h1>Page not found.</h1>
  <p>This page doesn't exist or may have moved. Head back to the homepage to find what you're looking for.</p>
  <a class="btn" href="/">Go to homepage →</a>
</body>
<script>
var path2 = window.location.pathname;
var isRedirect = ['/blog-52'].some(function(p){ return path2.startsWith(p); });
if (!isRedirect) {
  document.getElementById('not-found').style.display = 'flex';
}
</script>
</html>
